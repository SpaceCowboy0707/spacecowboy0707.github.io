<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颗粒 · Max Xiang</title>
<meta name="description" content="颗粒 — Max Xiang 的中文写作与摄影。物件、动作、温度、声音。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1EFE9;
    --paper-deep:#EAE7DF;
    --ink:#23241F;
    --ink-soft:#73746A;
    --hair:rgba(35,36,31,.16);
    --seal:#A93D2A;
    --seal-ink:#F1EFE9;
    --serif:'Noto Serif SC','Songti SC','SimSun',serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    /* 木头 */
    --wood-frame:#6E5138;
    --wood-frame-hi:#856548;
    --wood-back:#463527;
    --wood-plank:#8A6A4E;
    --wood-plank-edge:#5C452F;
  }
  /* 夜读(关灯) */
  html[data-theme="dark"]{
    --paper:#211E19;
    --paper-deep:#2A2620;
    --ink:#D9D1BE;
    --ink-soft:#948C7A;
    --hair:rgba(217,209,190,.16);
    --wood-frame:#4E3A28;
    --wood-frame-hi:#5F4933;
    --wood-back:#2E241A;
    --wood-plank:#5E462F;
    --wood-plank-edge:#3A2B1D;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    min-height:100svh;
    display:flex;flex-direction:column;
    transition:background .45s ease,color .45s ease;
  }
  ::selection{background:rgba(169,61,42,.18)}
  a{color:inherit;text-decoration:none}
  a:focus-visible,button:focus-visible{outline:2px solid var(--seal);outline-offset:3px}

  #progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--seal);z-index:50}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;justify-content:space-between;padding:22px clamp(20px,5vw,56px);gap:12px}
  .brand{display:flex;align-items:center;gap:14px;min-width:0}
  .seal{
    width:36px;height:36px;flex:none;background:var(--seal);color:var(--seal-ink);
    writing-mode:vertical-rl;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;letter-spacing:2px;border-radius:2px;
    box-shadow:0 0 0 1px rgba(169,61,42,.25) inset;
  }
  .brand-name{font-size:17px;font-weight:600;letter-spacing:.12em;white-space:nowrap}
  .brand-max{font-family:var(--mono);font-size:11px;font-weight:400;color:var(--ink-soft);letter-spacing:.06em;margin-left:6px}
  .brand-tag{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);letter-spacing:.06em;margin-top:3px}
  .head-right{display:flex;align-items:center;gap:clamp(12px,2.2vw,24px);flex:none}
  .site-nav{display:flex;gap:clamp(12px,2vw,20px);font-family:var(--mono);font-size:12px;letter-spacing:.08em}
  .site-nav a{color:var(--ink-soft);padding-bottom:2px;border-bottom:1px solid transparent;transition:color .25s,border-color .25s}
  .site-nav a:hover{color:var(--seal)}
  .site-nav a[aria-current]{color:var(--ink);border-color:var(--seal)}
  .head-btn{
    font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    background:none;border:1px solid var(--hair);border-radius:2px;
    color:var(--ink);padding:7px 13px;cursor:pointer;transition:border-color .25s,color .25s;
    white-space:nowrap;
  }
  .head-btn:hover{border-color:var(--ink)}

  main{flex:1;width:100%}

  /* ---------- 目录页 ---------- */
  .shelf-head{
    padding:clamp(16px,3.5vh,40px) clamp(20px,5vw,56px) 20px;
    display:flex;align-items:baseline;gap:16px;
  }
  .shelf-head h1{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:.14em}
  .shelf-head .count{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}

  .bookcase{
    margin:0 clamp(20px,5vw,56px) 34px;
    padding:clamp(10px,1.6vw,18px);
    border-radius:4px;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 2px, transparent 2px 9px),
      linear-gradient(180deg, var(--wood-frame-hi), var(--wood-frame) 30%, var(--wood-plank-edge));
    box-shadow:
      0 18px 34px -18px rgba(40,28,16,.55),
      inset 0 1px 0 rgba(255,235,210,.28);
    transition:background .45s ease;
  }
  .case-inner{
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.08) 0 2px, transparent 2px 11px),
      linear-gradient(180deg, #3D2E21, var(--wood-back) 26%, #52402F);
    border-radius:2px;
    box-shadow:inset 0 10px 22px rgba(0,0,0,.5), inset 0 -2px 6px rgba(0,0,0,.3);
    padding:clamp(22px,4vh,42px) clamp(14px,2vw,26px) 0;
  }
  .books{
    display:flex;align-items:flex-end;gap:7px;
    height:clamp(320px,50vh,500px);
    overflow-x:auto;overflow-y:hidden;overscroll-behavior-x:contain;
    padding:0 6px;
    scrollbar-width:thin;scrollbar-color:var(--wood-plank-edge) transparent;
  }
  .plank{
    height:16px;
    margin-left:calc(clamp(14px,2vw,26px) * -1);
    margin-right:calc(clamp(14px,2vw,26px) * -1);
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.06) 0 3px, transparent 3px 14px),
      linear-gradient(180deg, #A0805F, var(--wood-plank) 40%, var(--wood-plank-edge));
    border-top:1px solid rgba(255,235,210,.35);
    box-shadow:0 6px 10px -4px rgba(0,0,0,.55);
  }

  /* ---------- 书 ---------- */
  .book{
    position:relative;flex:none;
    width:var(--bw,88px);height:var(--bh,92%);
    background:
      linear-gradient(90deg,
        rgba(0,0,0,.30) 0, rgba(0,0,0,.12) 5%,
        rgba(255,255,255,.10) 9%, rgba(255,255,255,0) 16%,
        rgba(0,0,0,0) 84%, rgba(0,0,0,.18) 94%, rgba(0,0,0,.34) 100%),
      var(--book-bg,#4A3B30);
    color:var(--book-ink,#EFE9DD);
    border:1px solid rgba(0,0,0,.42);
    border-radius:4px 4px 3px 3px;
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.10),
      inset 0 -3px 0 rgba(0,0,0,.22),
      2px 0 0 rgba(0,0,0,.12);
    display:flex;flex-direction:column;align-items:center;
    padding:34px 6px 40px;
    transition:transform .3s cubic-bezier(.2,.8,.3,1),box-shadow .3s,opacity .2s;
  }
  .book::before,.book::after{
    content:"";position:absolute;left:9%;right:9%;height:0;
    border-top:1px solid var(--band,rgba(241,239,233,.55));
    border-bottom:1px solid var(--band,rgba(241,239,233,.55));
    padding-top:3px;opacity:.75;
  }
  .book::before{top:16px}
  .book::after{bottom:26px}
  .book:hover,.book:focus-visible{
    transform:translateY(-14px);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.10),
      inset 0 -3px 0 rgba(0,0,0,.22),
      0 18px 22px -8px rgba(0,0,0,.55);
    z-index:2;
  }
  .book-title{
    writing-mode:vertical-rl;text-orientation:mixed;
    font-size:19px;font-weight:600;letter-spacing:.3em;
    max-height:100%;overflow:hidden;
  }
  .book-mini-seal{
    position:absolute;bottom:34px;left:50%;transform:translateX(-50%);
    width:13px;height:13px;background:var(--seal);border-radius:1px;opacity:.9;
  }
  .book-label{
    position:absolute;bottom:9px;left:50%;transform:translateX(-50%);
    color:var(--book-ink);opacity:.72;
    font-family:var(--mono);font-size:9px;letter-spacing:.04em;white-space:nowrap;
  }
  /* 布面色系(衣柜色卡:低饱和大地色 × 10) */
  .t0{--book-bg:linear-gradient(180deg,#4E3E32,#453729);--book-ink:#EDE6D8;--band:rgba(237,230,216,.5)}   /* 深咖 espresso */
  .t1{--book-bg:linear-gradient(180deg,#6E4F3C,#61452F);--book-ink:#F0E8DA;--band:rgba(240,232,218,.5)}   /* 胡桃 walnut   */
  .t2{--book-bg:linear-gradient(180deg,#A98A62,#9C7D55);--book-ink:#322A1E;--band:rgba(50,42,30,.4)}      /* 驼   camel    */
  .t3{--book-bg:linear-gradient(180deg,#D9CFBA,#CCC1A9);--book-ink:#37322A;--band:rgba(55,50,42,.4)}      /* 燕麦 oat      */
  .t4{--book-bg:linear-gradient(180deg,#E9E3D3,#DED7C4);--book-ink:#3A352C;--band:rgba(58,53,44,.35)}     /* 米白 ecru     */
  .t5{--book-bg:linear-gradient(180deg,#5B614F,#4F5545);--book-ink:#EEEAE0;--band:rgba(238,234,224,.5)}   /* 橄榄 olive    */
  .t6{--book-bg:linear-gradient(180deg,#41494A,#394041);--book-ink:#E7E9E6;--band:rgba(231,233,230,.5)}   /* 墨绿 moss     */
  .t7{--book-bg:linear-gradient(180deg,#8E8B81,#807D72);--book-ink:#26251F;--band:rgba(38,37,31,.4)}      /* 岩灰 stone    */
  .t8{--book-bg:linear-gradient(180deg,#4D5665,#434B59);--book-ink:#E9EAEA;--band:rgba(233,234,234,.5)}   /* 灰蓝 slate    */
  .t9{--book-bg:linear-gradient(180deg,#303845,#2A313D);--book-ink:#E6E8EB;--band:rgba(230,232,235,.5)}   /* 藏青 navy     */

  .shelf-note{
    padding:0 clamp(20px,5vw,56px) 30px;
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.04em;
  }

  /* ---------- 开书转场 ---------- */
  .book-fly{
    position:fixed;z-index:80;
    perspective:1600px;
    transition:top .55s cubic-bezier(.45,.05,.2,1),left .55s cubic-bezier(.45,.05,.2,1),
               width .55s cubic-bezier(.45,.05,.2,1),height .55s cubic-bezier(.45,.05,.2,1),
               opacity .28s ease;
  }
  .book-fly .fly-page{
    position:absolute;inset:0;background:var(--paper);
    border-radius:4px;box-shadow:0 30px 70px rgba(0,0,0,.45);
  }
  .book-fly .fly-cover{
    position:absolute;inset:0;
    background:var(--book-bg,#4A3B30);color:var(--book-ink,#EFE9DD);
    border:1px solid rgba(0,0,0,.42);border-radius:4px;
    transform-origin:left center;
    transition:transform .62s cubic-bezier(.5,.05,.25,1) .1s;
    backface-visibility:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  .book-fly .fly-title{
    writing-mode:vertical-rl;text-orientation:mixed;
    font-size:clamp(19px,3vw,30px);font-weight:600;letter-spacing:.3em;
  }

  /* ---------- 暗房 ---------- */
  .darkroom{
    position:relative;
    margin:0 clamp(20px,5vw,56px) 34px;
    background:
      radial-gradient(120% 55% at 50% 0%, rgba(169,61,42,.18), transparent 58%),
      #1B1815;
    border-radius:4px;
    padding:clamp(24px,4vh,46px) clamp(14px,3vw,36px) clamp(30px,5vh,54px);
    box-shadow:inset 0 0 70px rgba(0,0,0,.55), 0 18px 34px -18px rgba(20,14,10,.5);
    animation:enter .55s ease both;
    transition:background .5s ease;
  }
  .dk-head{display:flex;align-items:center;gap:14px;margin-bottom:clamp(24px,4vh,40px);padding-right:60px}
  .dk-lamp{
    width:10px;height:10px;border-radius:50%;flex:none;
    background:var(--seal);
    box-shadow:0 0 16px 5px rgba(169,61,42,.5);
    animation:lamp 4.5s ease-in-out infinite;
    transition:opacity .4s,box-shadow .4s;
  }
  @keyframes lamp{0%,100%{opacity:1}50%{opacity:.7}}
  .dk-note{
    font-family:var(--mono);font-size:11px;color:rgba(220,210,195,.55);
    letter-spacing:.05em;transition:color .4s;
  }
  /* 拉绳开关 */
  .dk-cord{
    position:absolute;top:0;right:clamp(28px,6vw,72px);
    width:26px;height:92px;
    background:none;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;
    z-index:3;
  }
  .cord-line{width:2px;height:68px;background:linear-gradient(180deg,#847660,#5C5142)}
  .cord-handle{
    width:10px;height:17px;border-radius:3px;
    background:linear-gradient(180deg,#C8A87B,#8F7146);
    box-shadow:0 2px 4px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.2);
  }
  .dk-cord.pull{animation:pull .4s cubic-bezier(.3,1.6,.5,1)}
  @keyframes pull{35%{transform:translateY(9px)}100%{transform:none}}

  .line-row{position:relative;padding-top:24px;margin-bottom:clamp(30px,5vh,52px)}
  .line-row:last-child{margin-bottom:0}
  .rope{position:absolute;top:0;left:0;width:100%;height:26px;pointer-events:none}
  .prints{
    display:flex;gap:clamp(16px,3vw,36px);
    justify-content:flex-start;
    overflow-x:auto;overflow-y:hidden;overscroll-behavior-x:contain;
    padding:0 clamp(8px,3vw,30px) 14px;
    scrollbar-width:thin;scrollbar-color:#5A4A38 transparent;
  }
  @media (min-width:900px){ .prints{justify-content:center} }
  .print{
    position:relative;flex:none;
    background:#F4F1E8;padding:8px 8px 30px;
    transform:rotate(var(--tilt,0deg));transform-origin:top center;
    box-shadow:0 14px 22px -8px rgba(0,0,0,.7);
    transition:transform .35s cubic-bezier(.2,.8,.3,1);
  }
  .print:hover{transform:rotate(0deg) translateY(3px)}
  .pin{
    position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    width:11px;height:22px;border-radius:2px;
    background:linear-gradient(180deg,#C8A87B,#9E7E52);
    box-shadow:0 1px 3px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.15);
  }
  .pin::after{content:"";position:absolute;left:50%;top:9px;width:1px;height:8px;background:rgba(0,0,0,.3)}
  .shot{display:block;width:clamp(150px,22vw,220px)}
  img.shot{height:auto}
  div.shot{
    aspect-ratio:4/5;
    background:linear-gradient(160deg,#3B3833,#282521);
    display:flex;align-items:center;justify-content:center;
    color:rgba(220,210,195,.42);font-family:var(--mono);
    font-size:10px;letter-spacing:.06em;text-align:center;
    padding:14px;line-height:1.7;
  }
  /* 显影:只有红灯下,相纸才会显影(约 3 秒) */
  .shot{transition:opacity .6s ease}
  .darkroom.lit .shot{opacity:0}
  .darkroom:not(.lit) .shot{
    filter:brightness(.18) sepia(.85) hue-rotate(-28deg) saturate(2.4) blur(5px);
    transition:filter 3s ease .15s, opacity .6s ease;
  }
  .darkroom:not(.lit) .print.dev .shot{filter:none}
  .print-cap{transition:opacity .9s ease}
  .darkroom.lit .print-cap,
  .darkroom:not(.lit) .print:not(.dev) .print-cap{opacity:0}
  .print-cap{
    position:absolute;left:10px;right:10px;bottom:9px;
    font-family:var(--mono);font-size:9.5px;color:#6F695D;letter-spacing:.04em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  /* 开灯后的暗房 */
  .darkroom.lit{
    background:#B9B1A2;
    box-shadow:inset 0 0 40px rgba(0,0,0,.12), 0 18px 34px -18px rgba(20,14,10,.35);
  }
  .darkroom.lit .dk-lamp{opacity:.25;box-shadow:none;animation:none}
  .darkroom.lit .dk-note{color:rgba(45,40,32,.6)}
  .darkroom.lit .rope path{stroke:#7A6A54}
  .darkroom.lit .print{box-shadow:0 10px 18px -8px rgba(0,0,0,.4)}

  /* ---------- 阅读页 ---------- */
  .reader{
    max-width:41rem;margin:0 auto;
    padding:clamp(16px,4vh,40px) clamp(22px,6vw,32px) 60px;
    animation:enter .55s ease both;
  }
  @keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .reader-nav{
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:12px;color:var(--ink-soft);
    margin-bottom:clamp(28px,6vh,64px);letter-spacing:.05em;
  }
  .reader-nav a{border-bottom:1px solid transparent;transition:color .25s,border-color .25s}
  .reader-nav a:hover{color:var(--seal);border-color:var(--seal)}
  .post-title{font-size:clamp(30px,5vw,40px);font-weight:900;letter-spacing:.18em;margin-bottom:14px}
  .post-meta{
    font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);
    letter-spacing:.06em;margin-bottom:clamp(36px,7vh,72px);
  }
  .post-body p{
    font-size:17.5px;line-height:2.05;letter-spacing:.02em;
    text-indent:2em;text-align:justify;margin-bottom:.4em;
  }
  .post-body h2{
    font-size:18px;font-weight:600;letter-spacing:.4em;text-indent:.4em;
    text-align:center;margin:2.8em 0 1.6em;
  }
  .post-body h2::before{
    content:"";display:block;width:7px;height:7px;
    background:var(--seal);margin:0 auto 14px;
  }
  .post-body h2:first-child{margin-top:0}
  /* 诗:不缩进、不两端对齐 */
  .post-body.poem p{text-indent:0;text-align:left;margin-bottom:0;line-height:2.3}
  .fin{text-align:center;margin-top:4.5em;color:var(--ink-soft);letter-spacing:.5em;text-indent:.5em;font-size:15px}
  .fin-seal{
    width:44px;height:44px;margin:26px auto 0;
    background:var(--seal);color:var(--seal-ink);writing-mode:vertical-rl;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:600;letter-spacing:3px;border-radius:2px;
    transform:rotate(1.5deg);
    box-shadow:0 0 0 1px rgba(169,61,42,.25) inset;
  }
  .reader-foot{
    margin-top:56px;padding-top:22px;border-top:1px solid var(--hair);
    display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:12px;color:var(--ink-soft);
  }
  .reader-foot a:hover{color:var(--seal)}
  @media (min-width:1360px){
    .reader{position:relative}
    .post-title{
      position:absolute;top:6px;
      left:calc(100% + clamp(28px,4vw,84px));
      writing-mode:vertical-rl;text-orientation:mixed;
      margin:0;white-space:nowrap;
      font-size:clamp(36px,3.2vw,48px);letter-spacing:.3em;
    }
  }

  footer{
    padding:26px clamp(20px,5vw,56px);border-top:1px solid var(--hair);
    display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.05em;
  }
  footer a{border-bottom:1px solid transparent}
  footer a:hover{color:var(--seal);border-color:var(--seal)}

  @media (max-width:640px){
    .books{height:clamp(280px,44vh,380px);gap:6px}
    .book{padding:26px 4px 36px}
    .book-title{font-size:16px;letter-spacing:.24em}
    .brand-tag{display:none}
    .site-nav{display:none}
    .shelf-head .m-nav{display:inline}
  }
  .shelf-head .m-nav{display:none;font-family:var(--mono);font-size:12px}
  .shelf-head .m-nav a{color:var(--ink-soft);border-bottom:1px solid var(--seal);padding-bottom:2px}
</style>
</head>
<body>
<div id="progress"></div>

<header>
  <a class="brand" href="#/" data-route="/" aria-label="返回书架">
    <span class="seal" aria-hidden="true">颗粒</span>
    <span>
      <div class="brand-name">颗粒<span class="brand-max">Max.</span></div>
      <div class="brand-tag">物件、动作、温度、声音</div>
    </span>
  </a>
  <div class="head-right">
    <nav class="site-nav">
      <a href="#/" data-route="/" id="navShelf">书架</a>
      <a href="#/photos" data-route="/photos" id="navPhotos">暗房</a>
    </nav>
    <button class="head-btn" id="modeToggle"></button>
  </div>
</header>

<main id="app"></main>

<footer>
  <span id="footLeft"></span>
  <span><a href="https://spacecowboy0707.github.io" target="_blank" rel="noopener">作品集 →</a></span>
</footer>

<script>
/* ======== 文章库 & 照片库(更新内容改这里) ======== */
/* ============================================================
   颗粒 · 文章数据
   ------------------------------------------------------------
   发布新文章:在 POSTS 数组里加一个对象,格式照抄任意一篇。
   - slug : 网址里用的英文短名,不能重复,不能有空格

  { src: "", caption: "占位 · 03", date: "2026" },
  { src: "", caption: "占位 · 04", date: "2026" },
  { src: "", caption: "占位 · 05", date: "2026" },
];

</script>
<script>
(function(){
  const app = document.getElementById('app');
  const motionOK = !matchMedia('(prefers-reduced-motion: reduce)').matches;
  let theme = 'light';   // 默认开灯,不跟随系统
  let lit = true;   // 暗房灯:默认开着,相纸不显影

  /* ---------- 按日期自动排序(新的在前/书架最左) ---------- */
  const dateKey = p => {
    const n = (String(p.date||'').match(/\d+/g) || []).map(Number);
    return (n[0]||0)*10000 + (n[1]||0)*100 + (n[2]||0);   // 支持 2026 / 2026.07 / 2026.07.14 等写法
  };
  window.POSTS.sort((a,b) => dateKey(b) - dateKey(a));

  /* ---------- helpers ---------- */
  const byslug = s => window.POSTS.find(p => p.slug === s);
  const charCount = md => md.replace(/\s/g,'').length;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const hash = s => [...s].reduce((a,c)=>(a*31 + c.charCodeAt(0))>>>0, 7);
  const spineW = n => Math.round(Math.min(122, Math.max(54, 54 + (Math.log10(Math.max(n,10)) - 2) * 26)));
  const spineH = slug => 84 + (hash(slug) % 15);
  const toneOf = i => `t${(i*3) % 10}`;
  const readTime = n => `${n.toLocaleString()} 字 · 约 ${Math.max(1,Math.round(n/450))} 分钟`;
  function renderProse(md){
    return md.trim().split('\n').map(line=>{
      const s = line.trim();
      if(!s) return '';
      if(/^第.{1,4}章$/.test(s)) return `<h2>${esc(s)}</h2>`;
      return `<p>${esc(s)}</p>`;
    }).join('\n');
  }

  /* ---------- views ---------- */
  function viewIndex(){
    document.title = '颗粒 · Max Xiang';
    const items = [];
    window.POSTS.forEach((p,i)=>{
      items.push(`<a class="book ${toneOf(i)}" href="#/p/${p.slug}" data-route="/p/${p.slug}"
                 style="--bw:${spineW(charCount(p.zh))}px;--bh:${spineH(p.slug)}%"
                 title="${esc(p.title)}">
        <span class="book-title">${esc(p.title)}</span>
        <span class="book-mini-seal" aria-hidden="true"></span>
        <span class="book-label">${esc(p.date)}</span>
      </a>`);
    });
    app.innerHTML = `
      <div class="shelf-head">
        <h1>书架</h1><span class="count">共 ${window.POSTS.length} 册</span>
        <span class="m-nav"><a href="#/photos" data-route="/photos">去暗房 →</a></span>
      </div>
      <div class="bookcase">
        <div class="case-inner">
          <div class="books">${items.join('')}</div>
          <div class="plank"></div>
        </div>
      </div>
      <div class="shelf-note">书脊厚度 = 篇幅 · 横向滑动浏览 · 抽出一本开始阅读</div>`;
    window.scrollTo(0,0);
  }

  function viewPost(slug){
    const p = byslug(slug);
    if(!p){ navigate('/'); return; }
    const i = window.POSTS.indexOf(p);
    const prev = window.POSTS[i+1], next = window.POSTS[i-1];
    document.title = p.title + ' · 颗粒';
    app.innerHTML = `
      <article class="reader">
        <div class="reader-nav">
          <a href="#/" data-route="/" data-close="${p.slug}">← 书架</a>
          <span>${esc(p.date)}</span>
        </div>
        <h1 class="post-title">${esc(p.title)}</h1>
        <div class="post-meta">${readTime(charCount(p.zh))}</div>
        <div class="post-body${p.poem ? ' poem' : ''}">${renderProse(p.zh)}</div>
        <div class="fin">完</div>
        <div class="fin-seal" aria-hidden="true">颗粒</div>
        <div class="reader-foot">
          <span>${prev ? `<a href="#/p/${prev.slug}" data-route="/p/${prev.slug}">← 上一篇</a>` : ''}</span>
          <span>${next ? `<a href="#/p/${next.slug}" data-route="/p/${next.slug}">下一篇 →</a>` : ''}</span>
        </div>
      </article>`;
    window.scrollTo(0,0);
  }

  function viewPhotos(){
    document.title = '暗房 · 颗粒';
    const photos = window.PHOTOS || [];
    const tilts = [-2.4, 1.8, -1.1, 2.6, -1.9, 1.3];
    const rows = [];
    for(let i=0; i<photos.length; i+=3) rows.push(photos.slice(i, i+3));
    const rope = `<svg class="rope" viewBox="0 0 100 12" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,2.5 Q50,11 100,2.5" stroke="#5A4A38" stroke-width="1.1" fill="none"/>
    </svg>`;
    const rowsHtml = rows.map((row,r)=>`
      <div class="line-row">${rope}
        <div class="prints">
          ${row.map((ph,j)=>{
            const cap = ph.caption || '';
            const inner = ph.src
              ? `<img class="shot" src="${esc(ph.src)}" alt="${esc(cap)}" loading="lazy">`
              : `<div class="shot">照片占位<br>把图片文件放进仓库<br>在 PHOTOS 里填上文件名</div>`;
            return `<figure class="print" style="--tilt:${tilts[(r*3+j) % tilts.length]}deg">
              <span class="pin" aria-hidden="true"></span>
              ${inner}
              <figcaption class="print-cap">${esc(cap)}${ph.date ? ' · ' + esc(ph.date) : ''}</figcaption>
            </figure>`;
          }).join('')}
        </div>
      </div>`).join('');
    app.innerHTML = `
      <div class="shelf-head"><h1>暗房</h1><span class="count">${photos.length} 张</span></div>
      <div class="darkroom ${lit?'lit':''}" id="darkroom">
        <button class="dk-cord" id="dkCord" aria-pressed="${lit}" title="拉一下,开关灯" aria-label="拉一下,开关灯">
          <span class="cord-line" aria-hidden="true"></span>
          <span class="cord-handle" aria-hidden="true"></span>
        </button>
        <div class="dk-head">
          <span class="dk-lamp" aria-hidden="true"></span>
          <span class="dk-note" id="dkNote">${lit ? '灯还亮着,相纸不能见光 · 拉一下右上角的灯绳' : '红灯亮了,照片正在显影 · 再拉一下开灯'}</span>
        </div>
        ${rowsHtml}
      </div>`;
    window.scrollTo(0,0);

    /* 显影:红灯下才开始,约 3 秒 */
    const prints = [...app.querySelectorAll('.print')];
    const developAll = () => prints.forEach(pr => pr.classList.add('dev'));
    const resetDev   = () => prints.forEach(pr => pr.classList.remove('dev'));
    if(!lit) setTimeout(developAll, 120);   // 再次进入暗房时若还是红灯,重新显影一遍

    /* 灯绳 */
    const cord = document.getElementById('dkCord');
    cord.addEventListener('click', ()=>{
      lit = !lit;
      cord.classList.remove('pull'); void cord.offsetWidth; cord.classList.add('pull');
      cord.setAttribute('aria-pressed', String(lit));
      document.getElementById('darkroom').classList.toggle('lit', lit);
      resetDev();
      if(!lit) setTimeout(developAll, 120);
      document.getElementById('dkNote').textContent = lit
        ? '灯还亮着,相纸不能见光 · 拉一下右上角的灯绳'
        : '红灯亮了,照片正在显影 · 再拉一下开灯';
    });
  }

  /* ---------- 开书 / 合书转场 ---------- */
  let flying = false;
  function makeFly(toneClass, title){
    const fly = document.createElement('div');
    fly.className = `book-fly ${toneClass}`;
    fly.innerHTML = `<div class="fly-page"></div>
      <div class="fly-cover ${toneClass}"><span class="fly-title">${esc(title)}</span></div>`;
    document.body.appendChild(fly);
    return fly;
  }
  const setRect = (el,r)=>{ el.style.top=r.top+'px'; el.style.left=r.left+'px'; el.style.width=r.width+'px'; el.style.height=r.height+'px'; };
  const setFull = el =>{ el.style.top='0px'; el.style.left='0px'; el.style.width=innerWidth+'px'; el.style.height=innerHeight+'px'; };

  function openBook(bookEl, route){
    if(!motionOK || flying){ navigate(route); return; }
    flying = true;
    const tone = (bookEl.className.match(/\bt\d\b/)||['t0'])[0];
    const title = bookEl.querySelector('.book-title').textContent;
    const fly = makeFly(tone, title);
    setRect(fly, bookEl.getBoundingClientRect());
    bookEl.style.opacity = '0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      setFull(fly);
      fly.querySelector('.fly-cover').style.transform = 'rotateY(-128deg)';
    }));
    setTimeout(()=>{ navigate(route); }, 620);
    setTimeout(()=>{ fly.style.opacity = '0'; }, 760);
    setTimeout(()=>{ fly.remove(); flying = false; }, 1080);
  }

  function closeBook(slug){
    if(!motionOK || flying){ navigate('/'); return; }
    flying = true;
    const i = window.POSTS.findIndex(p => p.slug === slug);
    const p = window.POSTS[i];
    const fly = makeFly(toneOf(Math.max(i,0)), p ? p.title : '');
    fly.style.transition = 'none';
    setFull(fly);
    const cover = fly.querySelector('.fly-cover');
    cover.style.transition = 'none';
    cover.style.transform = 'rotateY(-128deg)';
    void fly.offsetWidth;
    fly.style.transition = ''; cover.style.transition = '';
    navigate('/');
    const bookEl = app.querySelector(`a[data-route="/p/${slug}"]`);
    if(bookEl){
      bookEl.scrollIntoView({inline:'center', block:'nearest'});
      const r = bookEl.getBoundingClientRect();
      bookEl.style.opacity = '0';
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        setRect(fly, r);
        cover.style.transform = '';
      }));
      setTimeout(()=>{ bookEl.style.opacity = ''; fly.style.opacity = '0'; }, 640);
      setTimeout(()=>{ fly.remove(); flying = false; }, 940);
    } else {
      requestAnimationFrame(()=>{ fly.style.opacity = '0'; });
      setTimeout(()=>{ fly.remove(); flying = false; }, 320);
    }
  }

  /* ---------- 关灯 / 开灯(夜读) ---------- */
  const modeBtn = document.getElementById('modeToggle');
  function applyTheme(){
    document.documentElement.dataset.theme = theme;
    modeBtn.textContent = theme==='dark' ? '开灯' : '关灯';
  }
  modeBtn.addEventListener('click', ()=>{
    theme = theme==='dark' ? 'light' : 'dark';
    applyTheme();
  });

  /* ---------- footer ---------- */
  document.getElementById('footLeft').textContent =
    `© ${new Date().getFullYear()} ${window.SITE.author} · 写作 · 摄影 · 纽约`;

  /* ---------- routing(脚本接管,兼容沙箱预览) ---------- */
  const parseHash = () => (location.hash || '#/').replace(/^#/, '') || '/';
  let current = parseHash();

  function render(){
    const m = current.match(/^\/p\/([\w-]+)/);
    const onPhotos = /^\/photos/.test(current);
    document.getElementById('navShelf').toggleAttribute('aria-current', !m && !onPhotos);
    document.getElementById('navPhotos').toggleAttribute('aria-current', onPhotos);
    if(m) viewPost(m[1]);
    else if(onPhotos) viewPhotos();
    else viewIndex();
  }
  function navigate(r){
    if(r === current){ render(); return; }
    current = r;
    try{ history.pushState(null, '', '#' + r); }catch(e){ /* 沙箱环境下忽略 */ }
    render();
  }
  document.addEventListener('click', e=>{
    const a = e.target.closest('a[data-route]');
    if(!a) return;
    e.preventDefault();
    const r = a.getAttribute('data-route');
    if(a.classList.contains('book')) openBook(a, r);
    else if(a.dataset.close) closeBook(a.dataset.close);
    else navigate(r);
  });
  window.addEventListener('popstate', ()=>{ current = parseHash(); render(); });
  window.addEventListener('hashchange', ()=>{
    const h = parseHash();
    if(h !== current){ current = h; render(); }
  });

  /* ---------- reading progress ---------- */
  const bar = document.getElementById('progress');
  addEventListener('scroll', ()=>{
    const max = document.documentElement.scrollHeight - innerHeight;
    bar.style.width = max > 0 ? (scrollY/max*100)+'%' : '0';
  }, {passive:true});

  applyTheme();
  render();
})();
</script>
</body>
</html>
